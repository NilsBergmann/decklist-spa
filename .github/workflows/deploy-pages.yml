name: Deploy SPA to GitHub Pages

# Publishes just the app's runtime files to GitHub Pages on every push to the
# default branch. The app is plain HTML/CSS/ES-modules — no build step, just
# a curated copy of the folder (repo docs/config/fixtures are left out).

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Stage only what the app actually loads at runtime — leaves out
      # README.md, sample-cube.json, compose.yaml, .github/, .devcontainer/,
      # .gitignore, etc.
      - name: Stage app files
        run: |
          mkdir -p _site
          cp -r index.html style.css js assets _site/

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
