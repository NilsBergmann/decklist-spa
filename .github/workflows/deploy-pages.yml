name: Deploy SPA to GitHub Pages

# Publishes the static spa/ folder to GitHub Pages on every push to master.
# The app is plain HTML/CSS/ES-modules — no build step, just upload the folder.

on:
  push:
    branches: [master]
    paths:
      - 'spa/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload spa/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: spa

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
